name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Validate deploy secrets
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_PORT"
          test -n "$SERVER_USER"
          test -n "$SERVER_PASSWORD"
          if [ "$SERVER_PORT" != "2122" ]; then
            echo "SERVER_PORT must be 2122"
            exit 1
          fi

      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            package.json \
            package-lock.json \
            tsconfig.json \
            server.ts \
            database.ts \
            vite.config.ts \
            index.html \
            public \
            src

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Copy archive to server
        run: |
          sshpass -p "$SERVER_PASSWORD" scp \
            -P "$SERVER_PORT" \
            -o StrictHostKeyChecking=no \
            deploy.tar.gz \
            "$SERVER_USER@$SERVER_HOST:/home/tien/"

      - name: Deploy on server
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh \
            -p "$SERVER_PORT" \
            -o StrictHostKeyChecking=no \
            "$SERVER_USER@$SERVER_HOST" <<'EOF'
          set -e
          mkdir -p /home/tien/website
          tar -xzf /home/tien/deploy.tar.gz -C /home/tien/website
          cd /home/tien/website
          npm install
          npm run build
          pm2 restart patctc || pm2 start npm --name patctc -- start
          EOF
