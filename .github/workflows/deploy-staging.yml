name: Deploy to staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      STAGING_DOMAIN: staging.livelinepcbn.com
      STAGING_WORKER_NAME: website-electricity-staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Validate staging secrets
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Deploy staging Worker
        run: |
          npx wrangler deploy \
            --keep-vars \
            --name "$STAGING_WORKER_NAME" \
            --domain "$STAGING_DOMAIN" \
            --message "Deploy staging from ${GITHUB_SHA}"
